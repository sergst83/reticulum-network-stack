# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path


name: Java library publisher
on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
#    steps:
#      - name: Maven Library build and publish
#        uses: MathieuSoysal/Java-maven-library-publisher@v1.0.4
#        with:
#          nexus-username: ${{ secrets.NEXUS_USERNAME }}
#          nexus-password: ${{ secrets.NEXUS_PASSWORD }}
#          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
#          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}
#          github-token: ${{ secrets.GITHUB_TOKEN }}
#          java-version: 11
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
          server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
          settings-path: ${{ github.workspace }} # location for the settings.xml file

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Publish to GitHub Packages Apache Maven
        run: |
          # Запускаем mvn deploy и перехватываем вывод
          if mvn deploy -PgithubDeploy -DskipTests --batch-mode; then
            echo "✅ Deployment successful"
          else
            # Проверяем, была ли ошибка 409
            if grep -q "409 Conflict" "$HOME/.m2/log.txt" 2>/dev/null || \
               grep -q "status code: 409" <(mvn deploy -PgithubDeploy -DskipTests --batch-mode 2>&1 | tee /tmp/mvn.log); then
              echo "🟨 409 Conflict: Artifact already exists. Ignoring."
              exit 0
            else
              echo "❌ Deployment failed for another reason"
              cat /tmp/mvn.log
              exit 1
            fi
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }} # GITHUB_TOKEN is the default env for the password

      - name: Set up Apache Maven Central
        uses: actions/setup-java@v5
        with: # running setup-java again overwrites the settings.xml
          distribution: 'temurin'
          java-version: '11'
          server-id: central # Value of the distributionManagement/repository/id field of the pom.xml
          server-username: MAVEN_USERNAME # env variable for username in deploy
          server-password: MAVEN_CENTRAL_TOKEN # env variable for token in deploy
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }} # Value of the GPG private key to import
          gpg-passphrase: MAVEN_GPG_PASSPHRASE # env variable for GPG private key passphrase

      - name: Publish to Apache Maven Central
        run: mvn deploy -PossrhDeploy
        env:
          MAVEN_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.NEXUS_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
